<div style="align-content: flex-start; flex-flow: column; border-radius: 3rem;">
	<div style="position: relative; text-align: left; color: white; width: 60%; min-width: 400px; border-radius: 3rem;">
		<a href="{{ .Get "link" }}">
			<img style="width: 100%;  border-radius: 3rem;" alt="A screengrap from the game" src="{{ .Get "img" }}"/>
			<div style="position: absolute; 
					bottom: 0px; 
					left: 0px;
					padding: 8px; 
					border-radius: 3rem;
					border-top-left-radius: 2rem;
					border-top-right-radius: 2rem;
					width: 100%;
					height: 100%;
					background: rgb(0,0,0);
					background: linear-gradient(0deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0) 100%);
					">
			</div>
			<div style="position: absolute; 
					bottom: 0px; 
					left: 0px; 
					width: 100%;
					background: rgba(0,0,0, .5); 
					border-radius: 3rem;
					border-top-left-radius: 2rem;
					border-top-right-radius: 2rem;
					padding: 1.5rem;
				">
				{{ if .Get "header" }}
				<h2 style="color:white;">{{ .Get "header" }}</h2>
				{{ end }}
				{{ if .Get "text" }}
					<p style="color:white;"> {{ .Get "text" }} </p>
				{{ end }}
			</div>
		</a>
	</div>
	<br/>
</div>
